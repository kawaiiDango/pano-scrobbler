name: Build binaries
on:
  workflow_dispatch:
    inputs:
      upload-release:
        type: boolean
        description: 'Upload to GitHub Releases?'
        required: false
        default: false
jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-2025-vs2026, ubuntu-24.04, ubuntu-24.04-arm ]
        include:
          - os: windows-2025-vs2026
            resources-dir: windows-x64
          #            graalvm-url: https://github.com/graalvm/graalvm-ce-builds/releases/download/graal-25.1.3/graalvm-community-jdk-25i1-25.0.3_windows-x64_bin.zip
          - os: ubuntu-24.04
            resources-dir: linux-x64
          #            graalvm-url: https://github.com/graalvm/graalvm-ce-builds/releases/download/graal-25.1.3/graalvm-community-jdk-25i1-25.0.3_linux-x64_bin.tar.gz
          - os: ubuntu-24.04-arm
            resources-dir: linux-arm64
    #            graalvm-url: https://github.com/graalvm/graalvm-ce-builds/releases/download/graal-25.1.3/graalvm-community-jdk-25i1-25.0.3_linux-aarch64_bin.tar.gz
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Fix permissions
        if: matrix.resources-dir != 'windows-x64'
        shell: bash
        run: |
          chmod +x ./gradlew

      - name: Set up common secrets
        shell: bash
        run: |
          echo "${{ secrets.LOCAL_PROPERTIES }}" > local.properties

      - if: matrix.resources-dir == 'linux-x64'
        name: Set up Android secrets
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_JKS }}" | base64 -d - > androidApp/android-keystore.jks

      - if: matrix.resources-dir == 'linux-x64'
        name: Build APK
        shell: bash
        run: |
          export JAVA_HOME=$JAVA_HOME_21_X64
          $ANDROID_HOME/cmdline-tools/**/bin/sdkmanager --update
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed
          ./gradlew androidApp:assembleReleaseGithub --no-daemon

      - if: matrix.resources-dir == 'linux-x64'
        name: Upload Android binary
        uses: actions/upload-artifact@v7
        with:
          name: pano-scrobbler-android-universal
          path: dist/pano-scrobbler-android-universal*

      - name: Install GraalVM CE
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25.1'
          distribution: 'graalvm-community'
          github-token: ${{ github.token }}

      #      - name: Install GraalVM CE manually
      #        shell: bash
      #        run: |
      #          curl -fL -o graalvm-archive "${{ matrix.graalvm-url }}"
      #          if [[ "${{ matrix.graalvm-url }}" == *.zip ]]; then
      #            unzip -q graalvm-archive
      #          else
      #            tar -xzf graalvm-archive
      #          fi
      #          echo "JAVA_HOME=$PWD/graalvm-community-25.1.3+9.1" >> $GITHUB_ENV
      #          echo "GRAALVM_HOME=$PWD/graalvm-community-25.1.3+9.1" >> $GITHUB_ENV
      #          echo "$PWD/graalvm-community-25.1.3+9.1/bin" >> $GITHUB_PATH

      - name: Download native libraries
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list \
            -R "kawaiiDango/pano-native-components" \
            --workflow "build.yml" \
            --status success \
            -L 1 \
            --json databaseId \
            -q '.[0].databaseId')

          if [ -z "$RUN_ID" ]; then
            echo "No successful runs found" >&2
            exit 1
          fi

          # Download artifacts from that run (filter by name if provided)
          gh run download "$RUN_ID" -R "kawaiiDango/pano-native-components" -n "libs-${{ matrix.resources-dir }}" -D composeApp/resources/${{ matrix.resources-dir }}

      - name: Build desktop jar and native image
        shell: bash
        run: |
          ./gradlew composeApp:exportLibraryDefinitions composeApp:packageUberJarForCurrentOS -PaboutLibraries.exportVariant=desktop --no-daemon

      - name: Upload desktop binary
        uses: actions/upload-artifact@v7
        with:
          name: pano-scrobbler-${{ matrix.resources-dir }}
          path: dist/pano-scrobbler-${{ matrix.resources-dir }}*

  upload-release:
    needs: [ build ]
    runs-on: windows-2025-vs2026
    if: ${{ inputs.upload-release == true }}
    steps:
      - name: Read version and changelog
        id: release_metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          verCode="$(gh api -H "Accept: application/vnd.github.raw" "/repos/${GITHUB_REPOSITORY}/contents/version.txt?ref=${GITHUB_SHA}")"
          verCode="$(echo "$verCode" | tr -d '\r\n' | xargs)"
          verName="$((verCode / 100)).$((verCode % 100))"
          echo "verCode=$verCode" >> "$GITHUB_OUTPUT"
          echo "verName=$verName" >> "$GITHUB_OUTPUT"
          
          changelogFooter=$'\n\n---\n\n#### Prefer getting the Linux and Android builds from an OS-specific repository listed on [README.md](https://github.com/kawaiiDango/pano-scrobbler/blob/main/README.md)'
          
          changelog="$(gh api -H "Accept: application/vnd.github.raw" "/repos/${GITHUB_REPOSITORY}/contents/changelog.md?ref=${GITHUB_SHA}")"
          {
            echo "changelog<<EOF"
            echo "$changelog"
            echo "$changelogFooter"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_metadata.outputs.verCode }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.release_metadata.outputs.verName }}
          body: ${{ steps.release_metadata.outputs.changelog }}
          preserve_order: true
          files: |
            dist/*.exe
            dist/*.apk
            dist/*.AppImage
            dist/*.deb
            dist/*.tar.gz

      - name: Dispatch static site build
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          sleep 7
          gh api repos/${{ github.repository }}/dispatches \
            -F event_type='static_site'

      - name: Install WingetCreate
        shell: bash
        run: |
          winget install --id Microsoft.WingetCreate --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: Submit to winget-pkgs
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        shell: bash
        run: |
          gh repo sync kawaiiDango/winget-pkgs -b master

          wingetcreate update kawaiiDango.pano-scrobbler \
            --version ${{ steps.release_metadata.outputs.verName }} \
            --urls "https://github.com/kawaiiDango/pano-scrobbler/releases/download/${{ steps.release_metadata.outputs.verCode }}/pano-scrobbler-windows-x64.exe" \
            --submit
